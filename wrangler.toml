# Cloudflare Workers configuration for UtilityDocker

name = "utilitydocker"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespaces
[[kv_namespaces]]
binding = "SESSIONS"
id = "1ed9777fd1c8437a9274b7d08217e02b"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "0baf5dbb766649c7b4e3335ea61af6af"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "utilitydocker"
database_id = "21f3a37a-adf7-410c-9ed7-fedfbbd7ee3d"
