# Cloudflare Workers / Pages configuration
# Used when deploying with the Cloudflare adapter for server-side routes

name = "utilitydocker"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespaces — create via: wrangler kv:namespace create <NAME>
# Then paste the IDs below

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_KV_ID"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_ID"

# D1 Database — create via: wrangler d1 create utilitydocker
# Then paste the database_id below
# Run migrations via: wrangler d1 execute utilitydocker --file=db/migrations/001_initial.sql

[[d1_databases]]
binding = "DB"
database_name = "utilitydocker"
database_id = "REPLACE_WITH_D1_ID"

# Environment variables (set via Cloudflare Pages dashboard, not here)
# STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_ID_MONTHLY
# RESEND_API_KEY, RESEND_AUDIENCE_ID, RESEND_FROM_EMAIL
# CLAUDE_API_KEY
# JWT_SECRET
# PUBLIC_AD_NETWORK, PUBLIC_GA4_ID
